services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-https://vexa.iron.md}
      VEXA_API_BASE: http://vexa:8056
      VEXA_API_KEY: ${VEXA_ADMIN_API_TOKEN}
      REQUEST_TIMEOUT_SECONDS: 45
    depends_on:
      - vexa

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vexa
      POSTGRES_USER: vexa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vexa-postgres:/var/lib/postgresql/data

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      ASR_MODEL: medium
      ASR_ENGINE: faster_whisper

  transcriber-proxy:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /srv
    environment:
      BACKEND_URL: http://whisper:9000/asr
      TRANSCRIBER_PROXY_KEY: ${TRANSCRIBER_PROXY_KEY}
    command: >
      sh -lc "pip install --no-cache-dir fastapi uvicorn httpx python-multipart &&
      cat > /srv/proxy.py <<'PY'
      import os
      from fastapi import FastAPI, File, Form, Header, HTTPException, UploadFile
      import httpx
      from fastapi.responses import JSONResponse

      app = FastAPI()
      backend_url = os.environ['BACKEND_URL']
      api_key = os.environ['TRANSCRIBER_PROXY_KEY']

      def check_auth(auth: str | None):
          expected = f'Bearer {api_key}'
          if auth != expected:
              raise HTTPException(status_code=401, detail='Unauthorized')

      @app.get('/health')
      async def health():
          return {'status': 'ok'}

      @app.post('/v1/audio/transcriptions')
      async def transcribe(
          file: UploadFile = File(...),
          model: str = Form('whisper-1'),
          language: str | None = Form(None),
          authorization: str | None = Header(default=None),
      ):
          check_auth(authorization)
          content = await file.read()
          async with httpx.AsyncClient(timeout=600) as client:
              response = await client.post(
                  backend_url,
                  params={
                      'task': 'transcribe',
                      'language': language,
                      'output': 'json',
                      'encode': 'true',
                      'vad_filter': 'true',
                  },
                  files={'audio_file': (file.filename, content, file.content_type or 'application/octet-stream')},
              )
          response.raise_for_status()
          payload = response.json()
          text = payload.get('text', '')
          return JSONResponse({'text': text, 'model': model})
      PY
      uvicorn proxy:app --host 0.0.0.0 --port 8000"
    depends_on:
      - whisper

  vexa:
    image: vexaai/vexa-lite:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vexa:${POSTGRES_PASSWORD}@postgres:5432/vexa
      ADMIN_API_TOKEN: ${VEXA_ADMIN_API_TOKEN}
      REMOTE_TRANSCRIBER_URL: http://transcriber-proxy:8000/v1/audio/transcriptions
      REMOTE_TRANSCRIBER_API_KEY: ${TRANSCRIBER_PROXY_KEY}
      SKIP_TRANSCRIPTION_CHECK: "false"
      STORAGE_BACKEND: local
      LOCAL_STORAGE_DIR: /var/lib/vexa/recordings
      LOCAL_STORAGE_FSYNC: "true"
      LOG_LEVEL: info
    depends_on:
      - postgres
      - transcriber-proxy
    volumes:
      - vexa-recordings:/var/lib/vexa/recordings

volumes:
  vexa-postgres:
  vexa-recordings:
