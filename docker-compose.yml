services:
  # ---------------------------------------------------------------
  # Official Vexa-Dashboard (Next.js)
  # ---------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VEXA_API_URL: http://vexa:8056
      VEXA_ADMIN_API_KEY: ${VEXA_ADMIN_API_TOKEN:-dev-vexa-admin-token}
      VEXA_ADMIN_API_URL: http://vexa:8056
      NEXT_PUBLIC_APP_URL: ${APP_BASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_VEXA_WS_URL: ${VEXA_WS_URL:-ws://localhost:8056/ws}
      JWT_SECRET: ${JWT_SECRET:-vexa-dev-jwt-secret}
      ALLOW_REGISTRATIONS: ${ALLOW_REGISTRATIONS:-true}
      DEFAULT_BOT_NAME: ${BOT_DISPLAY_NAME:-Layers Summarize}
      # AI Assistant (optional)
      AI_MODEL: ${AI_MODEL:-}
      AI_API_KEY: ${OPENAI_API_KEY:-}
      AI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      - vexa

  # ---------------------------------------------------------------
  # Vexa API (bot orchestration + transcription)
  # ---------------------------------------------------------------
  vexa:
    image: vexaai/vexa-lite:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vexa:${POSTGRES_PASSWORD:-dev-vexa-postgres-password}@postgres:5432/vexa
      ADMIN_API_TOKEN: ${VEXA_ADMIN_API_TOKEN:-dev-vexa-admin-token}
      REMOTE_TRANSCRIBER_URL: http://transcriber-proxy:8000/v1/audio/transcriptions
      REMOTE_TRANSCRIBER_API_KEY: ${TRANSCRIBER_PROXY_KEY:-dev-transcriber-proxy-key}
      TRANSCRIBER_URL: http://transcriber-proxy:8000/v1/audio/transcriptions
      TRANSCRIBER_API_KEY: ${TRANSCRIBER_PROXY_KEY:-dev-transcriber-proxy-key}
      SKIP_TRANSCRIPTION_CHECK: "false"
      STORAGE_BACKEND: local
      LOCAL_STORAGE_DIR: /var/lib/vexa/recordings
      LOCAL_STORAGE_FSYNC: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - postgres
      - transcriber-proxy
    volumes:
      - vexa-recordings:/var/lib/vexa/recordings

  # ---------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vexa
      POSTGRES_USER: vexa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-vexa-postgres-password}
    volumes:
      - vexa-postgres:/var/lib/postgresql/data

  # ---------------------------------------------------------------
  # Transcriber proxy (vexa audio → OpenAI STT)
  # ---------------------------------------------------------------
  transcriber-proxy:
    build:
      context: ./transcriber-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TRANSCRIBER_PROXY_KEY: ${TRANSCRIBER_PROXY_KEY:-dev-transcriber-proxy-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TRANSCRIBE_MODEL: ${OPENAI_TRANSCRIBE_MODEL:-gpt-4o-transcribe}
      OPENAI_DEFAULT_LANGUAGE: ${OPENAI_DEFAULT_LANGUAGE:-ru}
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  vexa-postgres:
  vexa-recordings:
