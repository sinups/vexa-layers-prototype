services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-https://vexa.iron.md}
      VEXA_API_BASE: http://vexa:8056
      VEXA_API_KEY: ${VEXA_ADMIN_API_TOKEN:-dev-vexa-admin-token}
      REQUEST_TIMEOUT_SECONDS: 45
    depends_on:
      - vexa

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vexa
      POSTGRES_USER: vexa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-vexa-postgres-password}
    volumes:
      - vexa-postgres:/var/lib/postgresql/data

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      ASR_MODEL: medium
      ASR_ENGINE: faster_whisper

  transcriber-proxy:
    build:
      context: ./transcriber-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://whisper:9000/asr
      TRANSCRIBER_PROXY_KEY: ${TRANSCRIBER_PROXY_KEY:-dev-transcriber-proxy-key}
    depends_on:
      - whisper

  vexa:
    image: vexaai/vexa-lite:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vexa:${POSTGRES_PASSWORD:-dev-vexa-postgres-password}@postgres:5432/vexa
      ADMIN_API_TOKEN: ${VEXA_ADMIN_API_TOKEN:-dev-vexa-admin-token}
      REMOTE_TRANSCRIBER_URL: http://transcriber-proxy:8000/v1/audio/transcriptions
      REMOTE_TRANSCRIBER_API_KEY: ${TRANSCRIBER_PROXY_KEY:-dev-transcriber-proxy-key}
      SKIP_TRANSCRIPTION_CHECK: "false"
      STORAGE_BACKEND: local
      LOCAL_STORAGE_DIR: /var/lib/vexa/recordings
      LOCAL_STORAGE_FSYNC: "true"
      LOG_LEVEL: info
    depends_on:
      - postgres
      - transcriber-proxy
    volumes:
      - vexa-recordings:/var/lib/vexa/recordings

volumes:
  vexa-postgres:
  vexa-recordings:
