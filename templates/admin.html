<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Layers Summarize — Сессии</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0f14;
      --panel: #171a22;
      --panel-2: #1e2230;
      --text: #f5f7fb;
      --muted: #8b95a8;
      --accent: #4f7cff;
      --accent-2: #6fe3c1;
      --danger: #ff7b7b;
      --warning: #ffb347;
      --border: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header nav { display: flex; gap: 8px; margin-left: 24px; }
    .header nav a {
      padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
      color: var(--muted); text-decoration: none; transition: all 0.15s;
    }
    .header nav a:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .header nav a.active { background: rgba(79,124,255,0.15); color: var(--accent); }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

    .toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .toolbar h2 { font-size: 22px; font-weight: 600; flex: 1; }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none; font: inherit;
      font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }

    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      padding: 20px; border-radius: 14px; background: var(--panel); border: 1px solid var(--border);
    }
    .stat-card .num { font-size: 28px; font-weight: 700; }
    .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td { padding: 14px 16px; font-size: 14px; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge-recording { background: rgba(111,227,193,0.15); color: var(--accent-2); }
    .badge-requested, .badge-joining { background: rgba(255,179,71,0.15); color: var(--warning); }
    .badge-done, .badge-ended, .badge-completed { background: rgba(79,124,255,0.15); color: var(--accent); }
    .badge-error, .badge-failed { background: rgba(255,123,123,0.15); color: var(--danger); }
    .badge-in_meeting, .badge-transcribing { background: rgba(111,227,193,0.15); color: var(--accent-2); }

    .platform-icon {
      display: inline-flex; align-items: center; gap: 6px; font-weight: 500;
    }
    .platform-dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-google_meet { background: #34a853; }
    .dot-zoom { background: #2d8cff; }
    .dot-teams { background: #7b5ea7; }

    .empty { text-align: center; padding: 64px 24px; color: var(--muted); }
    .empty p { font-size: 14px; margin-top: 12px; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) { .stats { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <header class="header">
    <h1>Layers Summarize</h1>
    <nav>
      <a href="/">Capture</a>
      <a href="/admin" class="active">Сессии</a>
    </nav>
    <div style="flex:1"></div>
    <span id="refresh-status" style="font-size:12px;color:var(--muted)"></span>
    <button class="btn btn-ghost" onclick="loadSessions()"><span class="spinner" id="load-spinner" style="display:none"></span> Обновить</button>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card"><div class="num" id="stat-total">—</div><div class="label">Всего сессий</div></div>
      <div class="stat-card"><div class="num" id="stat-active">—</div><div class="label">Активных</div></div>
      <div class="stat-card"><div class="num" id="stat-done">—</div><div class="label">Завершённых</div></div>
      <div class="stat-card"><div class="num" id="stat-error">—</div><div class="label">Ошибок</div></div>
    </div>

    <div class="toolbar">
      <h2>Сессии записи</h2>
    </div>

    <div id="content">
      <div class="empty">
        <div class="spinner"></div>
        <p>Загрузка сессий...</p>
      </div>
    </div>
  </div>

  <script>
    const PLATFORM_NAMES = { google_meet: 'Google Meet', zoom: 'Zoom', teams: 'Microsoft Teams' };
    const ACTIVE_STATUSES = new Set(['requested', 'joining', 'recording', 'transcribing', 'in_meeting']);
    const DONE_STATUSES = new Set(['done', 'ended', 'completed']);
    const ERROR_STATUSES = new Set(['error', 'failed']);

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function badgeClass(status) {
      const s = (status || '').toLowerCase();
      if (ACTIVE_STATUSES.has(s)) return 'badge-' + s;
      if (DONE_STATUSES.has(s)) return 'badge-done';
      if (ERROR_STATUSES.has(s)) return 'badge-error';
      return 'badge-requested';
    }

    function formatDate(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    }

    function renderTable(sessions) {
      if (!sessions || sessions.length === 0) {
        return '<div class="empty"><p>Нет записанных сессий. Перейдите на <a href="/" style="color:var(--accent)">страницу захвата</a> и отправьте бота во встречу.</p></div>';
      }

      const rows = sessions.map(s => {
        const platform = s.platform || '—';
        const meetingId = s.native_meeting_id || s.meeting_id || '—';
        const status = s.status || 'requested';
        const created = s.created_at || s.start_time || '';
        const pName = PLATFORM_NAMES[platform] || platform;

        return '<tr onclick="openSession(\'' + esc(platform) + '\',\'' + esc(meetingId) + '\')">' +
          '<td><span class="platform-icon"><span class="platform-dot dot-' + esc(platform) + '"></span>' + esc(pName) + '</span></td>' +
          '<td><code>' + esc(meetingId) + '</code></td>' +
          '<td><span class="badge ' + badgeClass(status) + '">' + esc(status) + '</span></td>' +
          '<td>' + esc(formatDate(created)) + '</td>' +
          '<td>' + esc(s.bot_name || '—') + '</td>' +
          '</tr>';
      }).join('');

      return '<table><thead><tr>' +
        '<th>Платформа</th><th>Meeting ID</th><th>Статус</th><th>Дата</th><th>Бот</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function updateStats(sessions) {
      const total = sessions.length;
      let active = 0, done = 0, errors = 0;
      sessions.forEach(s => {
        const st = (s.status || '').toLowerCase();
        if (ACTIVE_STATUSES.has(st)) active++;
        else if (DONE_STATUSES.has(st)) done++;
        else if (ERROR_STATUSES.has(st)) errors++;
      });
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-done').textContent = done;
      document.getElementById('stat-error').textContent = errors;
    }

    function openSession(platform, meetingId) {
      window.location.href = '/admin/session/' + encodeURIComponent(platform) + '/' + encodeURIComponent(meetingId);
    }

    async function loadSessions() {
      const spinner = document.getElementById('load-spinner');
      const refreshStatus = document.getElementById('refresh-status');
      spinner.style.display = 'inline-block';
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        const sessions = data.sessions || [];
        // Sort by most recent first
        sessions.sort((a, b) => {
          const da = a.created_at || a.start_time || '';
          const db = b.created_at || b.start_time || '';
          return db.localeCompare(da);
        });
        document.getElementById('content').innerHTML = renderTable(sessions);
        updateStats(sessions);
        refreshStatus.textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');
      } catch (err) {
        document.getElementById('content').innerHTML = '<div class="empty"><p>Ошибка загрузки: ' + esc(err.message) + '</p></div>';
      } finally {
        spinner.style.display = 'none';
      }
    }

    loadSessions();
    setInterval(loadSessions, 15000);
  </script>
</body>
</html>
